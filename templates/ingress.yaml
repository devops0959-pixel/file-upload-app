apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: dev.fileupload.local
      http:
        paths:
          - path: /
            pathType: Prefix
            
            backend:
              service: 
                name: {{ .Chart.Name }}-service
                port:
                  number: {{ .Values.ports.port }}